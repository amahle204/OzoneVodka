<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manager Dashboard — Ozone Promotions</title>
<link rel="stylesheet" href="styles.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
</head>
<body>

<!-- SIDEBAR -->
<nav class="sidebar">
  <div class="sidebar-brand"><div class="brand">⬡ OZONE</div><div class="sub">Manager Portal</div></div>
  <div class="user-badge">
    <div class="user-avatar avatar-manager" id="sb-av">NK</div>
    <div class="user-info"><div class="name" id="sb-name">Nomsa Khumalo</div><span class="role-badge rb-manager">Manager</span></div>
  </div>
  <div id="nav-menu"></div>
  <div class="sidebar-bottom"><button class="btn-logout" onclick="doLogout()">⏻ Sign Out</button></div>
</nav>

<!-- MAIN -->
<main class="main-content">
  <div class="page" id="page-dashboard"></div>
  <div class="page" id="page-bookings"></div>
  <div class="page" id="page-attendance"></div>
  <div class="page" id="page-stock"></div>
  <div class="page" id="page-reports"></div>
  <div class="page" id="page-photos"></div>
  <div class="page" id="page-storeqr"></div>
  <div class="page" id="page-invoices"></div>
  <div class="page" id="page-promoters"></div>
  <div class="page" id="page-applications"></div>
  <div class="page" id="page-products"></div>
  <div class="page" id="page-bi"></div>
  <div class="page" id="page-settings"></div>
</main>

<!-- MODALS -->
<div class="modal-overlay" id="modal-add-booking">
  <div class="modal">
    <h2>📅 Create New Booking</h2>
    <div style="background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.18);border-radius:var(--r);padding:10px 13px;margin-bottom:1rem;font-size:.87rem">
      Pay Rate: R<span id="booking-rate-display">65</span>/hr · 8-hour shift = <strong style="color:var(--oz-green)">R<span id="booking-total-display">520</span></strong>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Promoter</label><select id="bk-promoter"><option>Zanele Dlamini</option><option>Sipho Mokoena</option><option>Ayanda Nkosi</option><option>Thandeka Zulu</option></select></div>
      <div class="form-group"><label>Store</label><select id="bk-store"><option>Clicks — Gateway</option><option>Checkers — La Lucia</option><option>Dis-Chem — Pavilion</option><option>Pick n Pay — Musgrave</option></select></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Date</label><input type="date" id="bk-date"></div>
      <div class="form-group"><label>Shift</label><select id="bk-shift"><option>08:00–16:00</option><option>09:00–17:00</option><option>10:00–18:00</option><option>12:00–20:00</option></select></div>
    </div>
    <div class="form-group"><label>Product / Campaign</label><select id="bk-product"><option>Aqua Body Mist 200ml</option><option>Rose Glow Serum 30ml</option></select></div>
    <div class="form-group"><label>Notes for Promoter</label><textarea id="bk-notes" placeholder="Special instructions…"></textarea></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="OZ.closeModal('modal-add-booking')">Cancel</button>
      <button class="btn btn-accent" onclick="createBooking()">Send Booking →</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-invoice">
  <div class="modal">
    <h2>🧾 Create Invoice</h2>
    <div class="form-row">
      <div class="form-group"><label>Client / Store</label><input type="text" placeholder="Clicks Gateway"></div>
      <div class="form-group"><label>Invoice #</label><input type="text" placeholder="INV-2025-089"></div>
    </div>
    <div class="form-group"><label>Service Description</label><input type="text" placeholder="In-store promotion activation – 8 hours"></div>
    <div class="form-row">
      <div class="form-group"><label>Amount (ZAR)</label><input type="number" placeholder="520.00"></div>
      <div class="form-group"><label>Date</label><input type="date"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="OZ.closeModal('modal-invoice')">Cancel</button>
      <button class="btn btn-accent" onclick="OZ.toast('🧾 Invoice generated!');OZ.closeModal('modal-invoice')">Generate →</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-decline">
  <div class="modal" style="max-width:420px">
    <h2>❌ Decline Application</h2>
    <div class="form-group"><label>Reason</label><select id="decline-reason"><option>No vacancies in requested region</option><option>Incomplete or insufficient application</option><option>Does not meet minimum requirements</option><option>Position filled by another candidate</option><option>Other</option></select></div>
    <div class="form-group"><label>Additional Notes (optional)</label><textarea id="decline-notes" placeholder="Internal notes…"></textarea></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="OZ.closeModal('modal-decline')">Cancel</button>
      <button class="btn btn-danger" onclick="confirmDecline()">Confirm Decline</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-add-product">
  <div class="modal">
    <h2>🆕 Add Product / Campaign</h2>
    <div class="form-row">
      <div class="form-group"><label>Product Name</label><input type="text" id="np-name" placeholder="e.g. Vitamin C Brightener"></div>
      <div class="form-group"><label>SKU</label><input type="text" id="np-sku" placeholder="e.g. OZ-007"></div>
    </div>
    <div class="form-group"><label>Description / Talking Points</label><textarea id="np-desc" placeholder="Key benefits and what promoters should highlight to customers…"></textarea></div>
    <div class="form-row">
      <div class="form-group"><label>Category</label><select id="np-cat"><option>Body Care</option><option>Skincare</option><option>Hair Care</option><option>Fragrance</option><option>Gift Set / Bundle</option></select></div>
      <div class="form-group"><label>Status</label><select id="np-status"><option value="active">Active — Available to book</option><option value="draft">Draft — Not yet active</option></select></div>
    </div>
    <div class="form-group"><label>Barcode (optional)</label><input type="text" id="np-barcode" placeholder="8901234567890"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="OZ.closeModal('modal-add-product')">Cancel</button>
      <button class="btn btn-accent" onclick="addProduct()">Add Product</button>
    </div>
  </div>
</div>

<!-- ADD STORE MODAL -->
<div class="modal-overlay" id="modal-add-store">
  <div class="modal" style="max-width:560px">
    <h2>🏪 Add Store</h2>
    <div class="form-row">
      <div class="form-group">
        <label>Store / Retailer Name</label>
        <input type="text" id="ns-name" placeholder="e.g. Clicks — Ballito">
      </div>
      <div class="form-group">
        <label>Retailer</label>
        <input type="text" id="ns-retailer" placeholder="e.g. Clicks">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Branch / Mall</label>
        <input type="text" id="ns-branch" placeholder="e.g. Ballito Junction">
      </div>
      <div class="form-group">
        <label>Contact Email</label>
        <input type="email" id="ns-email" placeholder="store@retailer.co.za">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Contact Number</label>
        <input type="tel" id="ns-phone" placeholder="031 000 0000">
      </div>
      <div class="form-group">
        <label>Town / City</label>
        <input type="text" id="ns-town" placeholder="e.g. Ballito">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group" style="flex:2">
        <label>Street Address</label>
        <input type="text" id="ns-address" placeholder="e.g. 1 Edward Place, Ballito">
      </div>
      <div class="form-group">
        <label>Province</label>
        <select id="ns-province">
          <option>KwaZulu-Natal</option>
          <option>Gauteng</option>
          <option>Western Cape</option>
          <option>Eastern Cape</option>
          <option>Limpopo</option>
          <option>Mpumalanga</option>
          <option>North West</option>
          <option>Free State</option>
          <option>Northern Cape</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="OZ.closeModal('modal-add-store')">Cancel</button>
      <button class="btn btn-accent" onclick="saveNewStore()">Add Store →</button>
    </div>
  </div>
</div>

<!-- Chatbot -->
<button class="chat-fab" id="chat-fab" onclick="toggleChat()">
  💬<span class="chat-badge" id="chat-badge" style="display:none">!</span>
</button>
<div class="chat-panel" id="chat-panel">
  <div class="chat-header">
    <div class="ch-avatar">🤖</div>
    <div><div class="ch-name">Ozone Assistant</div><div class="ch-status">● Online · Manager mode</div></div>
    <button class="ch-close" onclick="toggleChat()">✕</button>
  </div>
  <div class="chat-messages" id="chat-messages"></div>
  <div class="chat-quick-replies" id="chat-qr"></div>
  <div class="chat-input-row">
    <input type="text" id="chat-input" placeholder="Ask me anything…" onkeydown="if(event.key==='Enter')sendChat()">
    <button class="chat-send-btn" onclick="sendChat()">➤</button>
  </div>
</div>
<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="javascript/supabase.js"></script>
<script src="javascript/auth-session.js"></script>
<script src="javascript/index.js"></script>
<script>
// ── SESSION CHECK ─────────────────────────────────────────────
(async () => {
  // TODO: Uncomment for live Supabase auth
  // const user = await checkSession();
  // if (!user) return;
  // const stored = sessionStorage.getItem('oz_user');

  // Demo: read from sessionStorage
  const stored = sessionStorage.getItem('oz_user');
  if (stored) {
    const u = JSON.parse(stored);
    document.getElementById('sb-name').textContent = u.name;
    document.getElementById('sb-av').textContent   = u.initials || u.name.split(' ').map(w=>w[0]).join('');
  }
})();

function doLogout() {
  // await window.supabaseClient.auth.signOut(); // Supabase signout
  sessionStorage.clear();
  window.location.href = 'login.html';
}

// ── NAV ───────────────────────────────────────────────────────
const NAV = [
  { section:'Overview',      items:[{id:'dashboard',icon:'📊',label:'Dashboard'},{id:'bi',icon:'📈',label:'Business Intelligence'}] },
  { section:'Operations',    items:[{id:'bookings',icon:'📅',label:'Bookings'},{id:'attendance',icon:'📍',label:'Attendance'},{id:'reports',icon:'📝',label:'Reports'},{id:'photos',icon:'📷',label:'Photos'},{id:'storeqr',icon:'📲',label:'Store QR Codes'}] },
  { section:'Inventory & Finance', items:[{id:'stock',icon:'📦',label:'Stock'},{id:'invoices',icon:'🧾',label:'Invoices'}] },
  { section:'Team',          items:[{id:'promoters',icon:'👥',label:'Promoters'},{id:'applications',icon:'📋',label:'Applications',dynamicBadge:true}] },
  { section:'Catalogue',     items:[{id:'products',icon:'🧴',label:'Products'}] },
  { section:'System',        items:[{id:'settings',icon:'⚙️',label:'Settings'}] },
];

function buildNav() {
  let html = '';
  NAV.forEach(sec => {
    html += `<div class="nav-section">${sec.section}</div>`;
    sec.items.forEach(item => {
      let badge = '';
      if (item.dynamicBadge) {
        const cnt = (_appData && _appData.length) ? _appData.filter(a=>a.status==='pending').length : (window.APPLICATIONS||[]).filter(a=>a.status==='pending').length;
        if (cnt > 0) badge = `<span class="nbadge nbadge-red">${cnt}</span>`;
      }
      html += `<div class="nav-item" id="nav-${item.id}" onclick="showPage('${item.id}')"><span class="nav-icon">${item.icon}</span><span>${item.label}</span>${badge}</div>`;
    });
  });
  document.getElementById('nav-menu').innerHTML = html;
}

let biCharts = {};
function showPage(id) {
  Object.values(biCharts).forEach(c=>c&&c.destroy&&c.destroy()); biCharts={};
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('page-'+id)?.classList.add('active');
  document.getElementById('nav-'+id)?.classList.add('active');
  const r = {
    dashboard:  renderDashboard,
    bookings:   renderBookings,
    attendance: renderAttendance,
    stock:      renderStock,
    reports:    renderReports,
    photos:     renderPhotos,
    storeqr:    renderStoreQR,
    invoices:   renderInvoices,
    promoters:  renderPromoters,
    applications: renderApplications,
    products:   renderProducts,
    bi:         renderBI,
    settings:   renderSettings,
  };
  r[id]?.();
}

// ── DASHBOARD ────────────────────────────────────────────────
function renderDashboard() {
  const p = (_appData && _appData.length) ? _appData.filter(a => a.status === 'pending').length : (window.APPLICATIONS||[]).filter(a => a.status === 'pending').length;

  document.getElementById('page-dashboard').innerHTML = `
  <div class="page-header">
    <div class="page-header-left">
      <h1>Welcome back, Nomsa 👋</h1>
      <p>${new Date().toLocaleDateString('en-ZA',{
        weekday:'long',
        year:'numeric',
        month:'long',
        day:'numeric'
      })}</p>
    </div>
  </div>

  <div class="stats-grid">

    <div class="stat-card" style="--accent-color:var(--oz-accent)">
      <div class="stat-label">Active Bookings</div>
      <div class="stat-value">12</div>
      <div class="stat-sub">3 this week</div>
      <div class="stat-icon">📅</div>
    </div>

    <div class="stat-card" style="--accent-color:var(--oz-green)">
      <div class="stat-label">Active Promoters</div>
      <div class="stat-value">4</div>
      <div class="stat-sub">1 inactive</div>
      <div class="stat-icon">👥</div>
    </div>

    <div class="stat-card" style="--accent-color:var(--oz-accent2)">
      <div class="stat-label">Pending Applications</div>
      <div class="stat-value" style="color:${p > 0 ? 'var(--oz-accent3)' : 'inherit'}">
        ${p}
      </div>
      <div class="stat-sub">
        <a onclick="showPage('applications')"
           style="color:var(--oz-accent);cursor:pointer;font-size:.72rem">
           Review now →
        </a>
      </div>
      <div class="stat-icon">📋</div>
    </div>

  </div>

  <div class="two-col">

    <div class="card">
      <div class="card-title">Recent Activity</div>

      <div class="timeline">

        <div class="timeline-item">
          <div class="timeline-time">Today 09:02</div>
          <div style="font-size:.84rem">
            Zanele Dlamini checked in at Clicks Gateway
          </div>
        </div>

        <div class="timeline-item">
          <div class="timeline-time">Today 08:45</div>
          <div style="font-size:.84rem">
            Booking B005 sent to Zanele Dlamini
          </div>
        </div>

        <div class="timeline-item">
          <div class="timeline-time">Yesterday 17:05</div>
          <div style="font-size:.84rem">
            Sipho Mokoena submitted feedback report
          </div>
        </div>

        <div class="timeline-item">
          <div class="timeline-time">Yesterday 16:00</div>
          <div style="font-size:.84rem">
            Invoice INV-2025-082 marked paid
          </div>
        </div>

        <div class="timeline-item">
          <div class="timeline-time">2 days ago</div>
          <div style="font-size:.84rem">
            New application from Lerato Mokoena
          </div>
        </div>

      </div>
    </div>

    <div class="card">

      <div class="card-title">Needs Attention</div>

      <div class="notif-item pending">
        <div class="notif-dot" style="background:var(--oz-accent3)"></div>
        <div>
          <b>Booking Response Overdue</b><br>
          <span style="font-size:.78rem;color:var(--oz-muted)">
            Sipho Mokoena hasn't responded to B002
          </span>
        </div>
      </div>

      <div class="notif-item pending">
        <div class="notif-dot" style="background:var(--oz-accent2)"></div>
        <div>
          <b>${p} Pending Application${p !== 1 ? 's' : ''}</b><br>
          <span style="font-size:.78rem;color:var(--oz-muted)">
            <a onclick="showPage('applications')"
               style="color:var(--oz-accent);cursor:pointer">
               Review now →
            </a>
          </span>
        </div>
      </div>

      <div class="notif-item alert">
        <div class="notif-dot" style="background:var(--oz-red)"></div>
        <div>
          <b>Invoice Overdue</b><br>
          <span style="font-size:.78rem;color:var(--oz-muted)">
            INV-2025-085 — Clicks Gateway
          </span>
        </div>
      </div>

    </div>

  </div>
  `;
}

// ── BOOKINGS ──────────────────────────────────────────────────
function renderBookings() {
  const S = window.SETTINGS, sym = S.currencySymbol;
  const period = window.period_bookings || 'month';
  const search = document.getElementById('bk-search')?.value || '';
  const statusF = document.getElementById('bk-status-filter')?.value || 'all';
  let data = OZ.filterByPeriod(window.BOOKINGS, 'date', period);
  if (search) data = data.filter(b => b.promoter.toLowerCase().includes(search.toLowerCase()) || b.store.toLowerCase().includes(search.toLowerCase()));
  if (statusF !== 'all') data = data.filter(b => b.status === statusF);

  document.getElementById('page-bookings').innerHTML = `
  <div class="page-header">
    <div class="page-header-left"><h1>Bookings</h1><p>Manage promoter assignments and activations</p></div>
    <div class="page-header-actions"><button class="btn btn-accent" onclick="OZ.openModal('modal-add-booking')">+ New Booking</button></div>
  </div>
  <div class="filter-bar">
    <input type="text" id="bk-search" placeholder="🔍 Search promoter or store…" value="${search}" oninput="renderBookings()">
    <select id="bk-status-filter" onchange="renderBookings()">
      <option value="all"${statusF==='all'?' selected':''}>All Status</option>
      <option value="pending"${statusF==='pending'?' selected':''}>Pending</option>
      <option value="confirmed"${statusF==='confirmed'?' selected':''}>Confirmed</option>
      <option value="declined"${statusF==='declined'?' selected':''}>Declined</option>
    </select>
    ${OZ.periodTabsHtml('bookings','renderBookings()')}
    <span style="font-size:.78rem;color:var(--oz-muted);margin-left:auto">${data.length} result${data.length!==1?'s':''}</span>
  </div>
  <div class="card"><div class="table-wrap"><table><thead><tr><th>Ref</th><th>Promoter</th><th>Store</th><th>Date</th><th>Shift</th><th>Product</th><th>Pay</th><th>Status</th><th>Actions</th></tr></thead><tbody>
  ${data.length ? data.map(b=>`<tr>
    <td><code style="font-size:.74rem;color:var(--oz-accent)">${b.id}</code></td>
    <td>${b.promoter}</td><td>${b.store}</td><td>${b.date}</td>
    <td style="font-size:.78rem;color:var(--oz-muted)">${b.shift}</td>
    <td style="font-size:.8rem">${b.product}</td>
    <td><span class="pay-badge">${sym}${S.hourlyRate*S.shiftHours}</span></td>
    <td><span class="badge ${b.status==='confirmed'?'badge-green':b.status==='declined'?'badge-red':'badge-amber'}">${b.status}</span></td>
    <td>${b.status==='pending'?`<button class="btn btn-sm btn-danger" onclick="OZ.toast('Booking cancelled')">Cancel</button>`:''}
        ${b.status==='confirmed'?`<span style="font-size:.78rem;color:var(--oz-dim)">Locked</span>`:''}
        ${b.status==='declined'?`<span style="font-size:.78rem;color:var(--oz-dim)">—</span>`:''}</td>
  </tr>`).join('') : `<tr><td colspan="9" style="text-align:center;color:var(--oz-dim);padding:2rem">No bookings found for this period</td></tr>`}
  </tbody></table></div></div>`;
}
function createBooking() { OZ.closeModal('modal-add-booking'); OZ.toast('📅 Booking sent to promoter!'); }

// ── ATTENDANCE ────────────────────────────────────────────────
function renderAttendance() {
  const S = window.SETTINGS;
  const period = window.period_attendance || 'month';
  const search = document.getElementById('att-search')?.value || '';
  const statusF = document.getElementById('att-status')?.value || 'all';
  let data = OZ.filterByPeriod(window.ATTENDANCE, 'date', period);
  if (search) data = data.filter(a => a.promoter.toLowerCase().includes(search.toLowerCase()) || a.store.toLowerCase().includes(search.toLowerCase()));
  if (statusF !== 'all') data = data.filter(a => a.status === statusF);

  document.getElementById('page-attendance').innerHTML = `
  <div class="page-header"><div class="page-header-left"><h1>Attendance &amp; Check-ins</h1><p>GPS-verified check-in records</p></div></div>
  <div class="filter-bar">
    <input type="text" id="att-search" placeholder="🔍 Search promoter or store…" value="${search}" oninput="renderAttendance()">
    <select id="att-status" onchange="renderAttendance()">
      <option value="all"${statusF==='all'?' selected':''}>All Status</option>
      <option value="complete"${statusF==='complete'?' selected':''}>Complete</option>
      <option value="incomplete"${statusF==='incomplete'?' selected':''}>Incomplete</option>
    </select>
    ${OZ.periodTabsHtml('attendance','renderAttendance()')}
    <span style="font-size:.78rem;color:var(--oz-muted);margin-left:auto">${data.length} records</span>
  </div>
  <div class="card" style="margin-bottom:1rem"><div class="table-wrap"><table><thead><tr><th>Promoter</th><th>Store</th><th>Date</th><th>Check-in</th><th>Check-out</th><th>GPS</th><th>Device</th><th>Photos</th><th>Status</th></tr></thead><tbody>
  ${data.length ? data.map(a=>`<tr><td>${a.promoter}</td><td>${a.store}</td><td>${a.date}</td>
    <td style="color:var(--oz-green)">${a.checkin}</td><td style="color:var(--oz-muted)">${a.checkout}</td>
    <td><code style="font-size:.7rem;color:var(--oz-accent)">${a.gps}</code></td>
    <td><code style="font-size:.7rem;color:var(--oz-dim)">${a.device}</code></td>
    <td><span class="badge ${a.photos>=S.minPhotosPerShift?'badge-green':'badge-amber'}">${a.photos}/${S.minPhotosPerShift}</span></td>
    <td><span class="badge ${a.status==='complete'?'badge-green':'badge-amber'}">${a.status}</span></td></tr>`).join('') : `<tr><td colspan="9" style="text-align:center;color:var(--oz-dim);padding:2rem">No records for this period</td></tr>`}
  </tbody></table></div></div>
  <div class="card"><div class="card-title">GPS Check-in Map</div><div class="map-placeholder"><span style="font-size:1.8rem">🗺️</span><span style="font-size:.87rem">GPS coordinates logged for all check-ins</span><span style="font-size:.73rem;color:var(--oz-dim)">Durban area · ${data.length} locations tracked</span></div></div>`;
}

// ── REPORTS ───────────────────────────────────────────────────
function renderReports() {
  const period = window.period_reports || 'month';
  const search = document.getElementById('rp-search')?.value || '';
  const promoterF = document.getElementById('rp-promoter')?.value || 'all';
  let data = OZ.filterByPeriod(window.REPORTS, 'date', period);
  if (search) data = data.filter(r=>r.promoter.toLowerCase().includes(search.toLowerCase())||r.store.toLowerCase().includes(search.toLowerCase()));
  if (promoterF !== 'all') data = data.filter(r=>r.promoter===promoterF);

  document.getElementById('page-reports').innerHTML = `
  <div class="page-header"><div class="page-header-left"><h1>Feedback Reports</h1><p>Shift reports and performance insights</p></div></div>
  <div class="filter-bar">
    <input type="text" id="rp-search" placeholder="🔍 Search…" value="${search}" oninput="renderReports()">
    <select id="rp-promoter" onchange="renderReports()">
      <option value="all"${promoterF==='all'?' selected':''}>All Promoters</option>
      ${window.PROMOTERS.map(p=>`<option${promoterF===p.name?' selected':''}>${p.name}</option>`).join('')}

    ${OZ.periodTabsHtml('reports','renderReports()')}
    <span style="font-size:.78rem;color:var(--oz-muted);margin-left:auto">${data.length} report${data.length!==1?'s':''}</span>

function onInvoiceStoreChange() {
  const sel = document.getElementById('storeSelect');
  const store = window.SETTINGS.stores.find(s => s.id === sel.value);
  const box = document.getElementById('store-info-box');
  const content = document.getElementById('store-info-content');
  if (store) {
    box.style.display = 'block';
    content.innerHTML = `<strong>${store.name}</strong><br>📍 ${store.address}, ${store.town}, ${store.province}<br>📧 ${store.email || '—'} &nbsp;|&nbsp; 📞 ${store.phone || '—'}`;
  } else {
    box.style.display = 'none';
  }
  calculateInvoice();
}

function calculateInvoice() {
  const units    = Number(document.getElementById('unitsSold')?.value || 0);
  const price    = Number(document.getElementById('unitPrice')?.value || 0);
  const vatPct   = Number(document.getElementById('vatRate')?.value || 0);
  const subtotal = units * price;
  const vatAmt   = subtotal * (vatPct / 100);
  const total    = subtotal + vatAmt;

  const fmt = v => v.toFixed(2);
  document.getElementById('invoiceTotal').textContent    = fmt(total);
  document.getElementById('invoiceSubtotal').textContent = fmt(subtotal);
  document.getElementById('invoiceVat').textContent      = fmt(vatAmt);

  // Update preview
  const sel   = document.getElementById('storeSelect');
  const store = window.SETTINGS.stores.find(s => s.id === sel?.value);
  document.getElementById('prevBrand').textContent    = document.getElementById('brandName')?.value || '—';
  document.getElementById('prevStore').textContent    = store?.name || '—';
  document.getElementById('prevAddress').textContent  = store ? `${store.address}, ${store.town}, ${store.province}` : '—';
  document.getElementById('prevEmail').textContent    = store?.email || '—';
  document.getElementById('prevPhone').textContent    = store?.phone || '—';
  document.getElementById('prevDate').textContent     = document.getElementById('invoiceDate')?.value || '—';
  document.getElementById('prevUnits').textContent    = units ? `${units} units @ R${price}` : '—';
  document.getElementById('prevSubtotal').textContent = `R${fmt(subtotal)}`;
  document.getElementById('prevVat').textContent      = `R${fmt(vatAmt)} (${vatPct}%)`;
  document.getElementById('prevTotal').textContent    = `R${fmt(total)}`;
}

function updateInvoicePreview() { calculateInvoice(); }

// ── APPLICATIONS — Supabase wired ─────────────────────────────
let currentDeclineId = null;
let currentApplicationFilter = 'pending';
let _appData = [];  // in-memory cache from DB

async function renderApplications() {
  const page = document.getElementById('page-applications');
  const search = document.getElementById('app-search')?.value || '';

  // Show skeleton while loading
  page.innerHTML = `<div class="page-header"><div class="page-header-left"><h1>Applications</h1><p>Review, approve or decline promoter applications</p></div></div><div class="card" style="text-align:center;padding:2rem;color:var(--oz-muted)">⏳ Loading applications…</div>`;

  const db = window.supabaseClient;
  const { data, error } = await db
    .from('applications')
    .select('id, ref_number, first_name, last_name, email, phone, id_number, region, experience_band, motivation, status, applied_at, decline_reason, decline_notes')
    .order('applied_at', { ascending: false });

  if (error) {
    page.innerHTML = `<div class="card" style="text-align:center;padding:2rem;color:var(--oz-red)">❌ Failed to load applications: ${error.message}</div>`;
    return;
  }

  _appData = data || [];

  // Filter
  let filtered = currentApplicationFilter === 'all' ? _appData : _appData.filter(a => a.status === currentApplicationFilter);
  if (search) filtered = filtered.filter(a => (a.first_name + ' ' + a.last_name).toLowerCase().includes(search.toLowerCase()));

  const counts = {
    pending:  _appData.filter(a => a.status === 'pending').length,
    approved: _appData.filter(a => a.status === 'approved').length,
    declined: _appData.filter(a => a.status === 'declined').length,
  };

  // Update nav badge
  buildNav();

  let html = `
  <div class="page-header">
    <div class="page-header-left"><h1>Applications</h1><p>Review, approve or decline promoter applications</p></div>
    <div class="page-header-actions">
      <select onchange="currentApplicationFilter=this.value;renderApplications()" style="background:var(--oz-surface2);border:1px solid var(--oz-border2);color:var(--oz-text);padding:7px 11px;border-radius:var(--r);font-family:var(--font-b);font-size:.82rem;outline:none">
        <option value="pending"${currentApplicationFilter==='pending'?' selected':''}>Pending</option>
        <option value="approved"${currentApplicationFilter==='approved'?' selected':''}>Approved</option>
        <option value="declined"${currentApplicationFilter==='declined'?' selected':''}>Declined</option>
        <option value="all"${currentApplicationFilter==='all'?' selected':''}>All</option>
      </select>
    </div>
  </div>
  <div class="filter-bar">
    <input type="text" id="app-search" placeholder="🔍 Search applicant name…" value="${search}" oninput="renderApplications()">
    <span style="font-size:.78rem;color:var(--oz-muted);margin-left:auto">${filtered.length} application${filtered.length!==1?'s':''}</span>
  </div>
  <div class="stats-grid" style="margin-bottom:1rem">
    <div class="stat-card" style="--accent-color:var(--oz-accent3)"><div class="stat-label">Pending</div><div class="stat-value">${counts.pending}</div><div class="stat-sub">Awaiting review</div></div>
    <div class="stat-card" style="--accent-color:var(--oz-green)"><div class="stat-label">Approved</div><div class="stat-value">${counts.approved}</div><div class="stat-sub">Onboarded</div></div>
    <div class="stat-card" style="--accent-color:var(--oz-red)"><div class="stat-label">Declined</div><div class="stat-value">${counts.declined}</div><div class="stat-sub">Not proceeding</div></div>
  </div>`;

  if (!filtered.length) {
    html += `<div class="card" style="text-align:center;padding:3rem"><div style="font-size:2rem;margin-bottom:.75rem">📭</div><div style="font-weight:600">No ${currentApplicationFilter} applications</div></div>`;
  } else {
    filtered.forEach(app => {
      const appliedDate = app.applied_at ? new Date(app.applied_at).toLocaleDateString('en-ZA') : '—';
      const statusBadge = app.status==='approved'
        ? '<span class="badge badge-green">✅ Approved</span>'
        : app.status==='declined'
          ? '<span class="badge badge-red">❌ Declined</span>'
          : '<span class="badge badge-amber">⏳ Pending</span>';
      let actions = '';
      if (app.status==='pending') {
        actions = `<button class="btn btn-success" onclick="approveApp('${app.id}','${app.first_name}','${app.last_name}')">✅ Approve</button><button class="btn btn-danger" onclick="openDecline('${app.id}')">❌ Decline</button>`;
      } else if (app.status==='approved') {
        actions = `<button class="btn btn-warning btn-sm" onclick="updateAppStatus('${app.id}','pending','Approval revoked.')">↩ Revoke</button>`;
      } else {
        actions = `<button class="btn btn-ghost btn-sm" onclick="updateAppStatus('${app.id}','pending','Moved back to pending.')">↩ Reconsider</button>`;
      }
      html += `<div class="applicant-card">
        <div class="ac-header"><div><div class="ac-name">${app.first_name} ${app.last_name}</div><div class="ac-meta">📧 ${app.email} · 📱 ${app.phone||'—'} · Applied: ${appliedDate}</div></div>${statusBadge}</div>
        <div class="ac-details">
          <div><div class="adi-label">Region</div><div class="adi-value">📍 ${app.region||'—'}</div></div>
          <div><div class="adi-label">Experience</div><div class="adi-value">💼 ${app.experience_band||'—'}</div></div>
          <div><div class="adi-label">SA ID</div><div class="adi-value">${app.id_number||'—'}</div></div>
          <div><div class="adi-label">Ref</div><div class="adi-value"><code style="color:var(--oz-accent);font-size:.75rem">${app.ref_number}</code></div></div>
        </div>
        <div style="font-size:.66rem;text-transform:uppercase;letter-spacing:1px;color:var(--oz-dim);font-weight:600;margin-bottom:5px">Motivation</div>
        <div class="ac-motivation">${app.motivation||'—'}</div>
        ${app.status==='declined' && app.decline_reason ? `<div style="margin-top:.5rem;font-size:.78rem;color:var(--oz-red)">Decline reason: ${app.decline_reason}</div>` : ''}
        <div class="ac-actions">${actions}</div>
      </div>`;
    });
  }
  page.innerHTML = html;
}

async function approveApp(id, firstName, lastName) {
  const db = window.supabaseClient;
  const { error } = await db
    .from('applications')
    .update({ status: 'approved', reviewed_by: window.OZ_USER?.id || null, reviewed_at: new Date().toISOString() })
    .eq('id', id);
  if (error) { OZ.toast('❌ Error: ' + error.message); return; }
  OZ.toast('✅ ' + firstName + ' ' + lastName + ' approved!');
  renderApplications();
}

async function updateAppStatus(id, status, toastMsg) {
  const db = window.supabaseClient;
  const { error } = await db
    .from('applications')

async function savePaySettings() {
  const hourlyRate  = Number(document.getElementById('st-hourly')?.value || 0);
  const shiftHours  = Number(document.getElementById('st-shifthrs')?.value || 8);
  const payDays     = Number(document.getElementById('st-paydays')?.value || 5);
  if (!hourlyRate) { OZ.toast('Hourly rate must be > 0'); return; }

  const db = window.supabaseClient;
  const { error } = await db
    .from('system_settings')
    .update({
      hourly_rate_zar:    hourlyRate,
      standard_shift_hrs: shiftHours,
      payment_terms_days: payDays,
      updated_by:         window.OZ_USER?.id || null,
    })
    .eq('id', 1);

  if (error) { OZ.toast('❌ Save failed: ' + error.message); return; }

  window.SETTINGS.hourlyRate       = hourlyRate;
  window.SETTINGS.shiftHours       = shiftHours;
  window.SETTINGS.paymentTermsDays = payDays;

  // Update preview
  const prev = document.getElementById('shift-pay-preview');
  if (prev) prev.innerHTML = `Shift pay: <strong style="color:var(--oz-green)">R${hourlyRate*shiftHours}</strong> (R${hourlyRate} × ${shiftHours}hrs)`;

  // Update booking modal display
  const rateEl = document.getElementById('booking-rate-display');
  const totEl  = document.getElementById('booking-total-display');
  if (rateEl) rateEl.textContent = hourlyRate;
  if (totEl)  totEl.textContent  = hourlyRate * shiftHours;

  OZ.toast('✅ Pay settings saved!');
}

async function saveShiftSettings() {
  const minPhotos = Number(document.getElementById('st-minphotos')?.value || 10);
  const db = window.supabaseClient;
  const { error } = await db
    .from('system_settings')
    .update({
      min_photos_per_shift: minPhotos,
      updated_by:           window.OZ_USER?.id || null,
    })
    .eq('id', 1);

  if (error) { OZ.toast('❌ Save failed: ' + error.message); return; }

  window.SETTINGS.minPhotosPerShift           = minPhotos;
  window.SETTINGS.lateCheckinThresholdMins    = Number(document.getElementById('st-latein')?.value  || 30);
  window.SETTINGS.checkinRadiusMeters         = Number(document.getElementById('st-gpsrad')?.value  || 200);
  window.SETTINGS.requireFeedbackBeforeCheckout = document.getElementById('st-feedback')?.checked ?? true;
  window.SETTINGS.showEarningsToPromoter      = document.getElementById('st-earnings')?.checked ?? true;
  window.SETTINGS.enableGPSVerification       = document.getElementById('st-gps')?.checked ?? true;

  OZ.toast('✅ Shift rules saved!');
}

async function saveNewStore() {
  const name     = document.getElementById('ns-name').value.trim();
  const retailer = document.getElementById('ns-retailer').value.trim();
  const branch   = document.getElementById('ns-branch').value.trim();
  const address  = document.getElementById('ns-address').value.trim();
  const province = document.getElementById('ns-province').value;
  if (!name || !retailer || !province) { OZ.toast('Store name, retailer and province are required'); return; }

  const db = window.supabaseClient;
  const { error } = await db
    .from('stores')
    .insert({
      name,
      retailer,
      branch:   branch || retailer,
      region:   province,
      address:  address || null,
      status:   'active',
    });

  if (error) { OZ.toast('❌ Save failed: ' + error.message); return; }

  ['ns-name','ns-retailer','ns-branch','ns-email','ns-phone','ns-town','ns-address'].forEach(id => {
    const el = document.getElementById(id); if (el) el.value = '';
  });
  OZ.closeModal('modal-add-store');
  OZ.toast('✅ Store added: ' + name);
  renderSettings();
}

async function removeStore(id, name) {
  if (!confirm('Remove ' + name + '? This cannot be undone.')) return;
  const db = window.supabaseClient;
  const { error } = await db.from('stores').update({ status: 'inactive' }).eq('id', id);
  if (error) { OZ.toast('❌ Error: ' + error.message); return; }
  OZ.toast('Store removed: ' + name);
  // Also remove from local SETTINGS.stores so invoice dropdown updates
  window.SETTINGS.stores = window.SETTINGS.stores.filter(s => s.id !== id);
  renderSettings();
}

async function applyAccent(c) {
  window.SETTINGS.accentColor = c;
  document.documentElement.style.setProperty('--oz-accent', c);
  OZ.toast('Accent updated');
  // Save to DB
  const { error } = await window.supabaseClient
    .from('system_settings')
    .update({ accent_color: c })
    .eq('id', 1);
  if (error) OZ.toast('❌ Could not save accent: ' + error.message);
}

// ── CHATBOT ────────────────────────────────────────────────────
let chatOpen = false;
const KB = {
  greeting: "Hi Nomsa! 👋 I'm here to help you navigate the system. Ask about bookings, applications, stock, invoices, or settings.",
  quickReplies: ["📅 Create booking","📊 BI Dashboard","📋 Pending applications","📦 Stock levels","⚙️ Settings"],
  responses: {
    "booking":     "Go to **Bookings** in the sidebar to manage assignments. Click **+ New Booking** to create one.",
    "bi":          "The **Business Intelligence** page shows revenue trends, promoter performance, stock, and invoice charts.",
    "dashboard":   "The **Dashboard** gives a quick overview of bookings, pending applications, low stock, and recent activity.",
    "application": "Go to **Applications** to review, approve or decline promoter applications.",
    "stock":       "Check **Stock Management** for inventory levels across all stores.",
    "invoice":     "Go to **Invoices** to view, generate, and mark invoices paid.",
    "promoter":    "See **Promoters** for your full team roster, earnings, and status.",
    "setting":     "Go to **Settings** to configure pay rates, shift rules, notifications, and stores.",
    "report":      "**Feedback Reports** shows all shift reports submitted by promoters.",
    "qr":          "Go to **Store QR Codes** to view and print check-in codes for each store.",
    "default":     "I can help navigate the manager system. Try asking about bookings, stock, invoices, BI, applications, or settings."
  }
};
function toggleChat(){chatOpen=!chatOpen;document.getElementById('chat-panel').classList.toggle('open',chatOpen);document.getElementById('chat-badge').style.display='none';if(chatOpen&&document.getElementById('chat-messages').children.length===0){addBot(KB.greeting);setQR(KB.quickReplies);}}
function addBot(text,delay=0){const msgs=document.getElementById('chat-messages');if(delay>0){const t=document.createElement('div');t.className='chat-msg bot';t.innerHTML='<div class="chat-typing"><span></span><span></span><span></span></div>';t.id='typ';msgs.appendChild(t);msgs.scrollTop=msgs.scrollHeight;setTimeout(()=>{document.getElementById('typ')?.remove();appendBot(text);},delay);}else appendBot(text);}
function appendBot(text){const msgs=document.getElementById('chat-messages'),el=document.createElement('div');el.className='chat-msg bot';el.innerHTML=`<div class="chat-bubble">${text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')}</div><div class="chat-time">${new Date().toLocaleTimeString('en-ZA',{hour:'2-digit',minute:'2-digit'})}</div>`;msgs.appendChild(el);msgs.scrollTop=msgs.scrollHeight;}
function setQR(chips){document.getElementById('chat-qr').innerHTML=chips.map(c=>`<span class="qr-chip" onclick="handleQR('${c}')">${c}</span>`).join('');}
function handleQR(text){document.getElementById('chat-qr').innerHTML='';sendMsg(text);}
function sendChat(){const i=document.getElementById('chat-input'),t=i.value.trim();if(!t)return;i.value='';sendMsg(t);}
function sendMsg(text){
  const msgs=document.getElementById('chat-messages'),el=document.createElement('div');el.className='chat-msg user';
  el.innerHTML=`<div class="chat-bubble">${text}</div><div class="chat-time">${new Date().toLocaleTimeString('en-ZA',{hour:'2-digit',minute:'2-digit'})}</div>`;
  msgs.appendChild(el);msgs.scrollTop=msgs.scrollHeight;
  const q=text.toLowerCase();let r=null;
  if(q.includes('booking')){r=KB.responses['booking'];setTimeout(()=>showPage('bookings'),1200);}
  else if(q.includes('bi')||q.includes('intelligence')){r=KB.responses['bi'];setTimeout(()=>showPage('bi'),1200);}
  else if(q.includes('application')){r=KB.responses['application'];setTimeout(()=>showPage('applications'),1200);}
  else if(q.includes('setting')){r=KB.responses['setting'];setTimeout(()=>showPage('settings'),1200);}
  else if(q.includes('stock')){r=KB.responses['stock'];setTimeout(()=>showPage('stock'),1200);}
  else if(q.includes('invoice')){r=KB.responses['invoice'];setTimeout(()=>showPage('invoices'),1200);}
  else{for(const[k,v]of Object.entries(KB.responses)){if(k!=='default'&&q.includes(k)){r=v;break;}}}
  if(!r)r=KB.responses['default'];
  addBot(r,750);
  setTimeout(()=>setQR(["📅 Bookings","📊 BI Dashboard","📋 Applications","⚙️ Settings"]),900);
}
