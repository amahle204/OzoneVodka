<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Promoter Dashboard — Ozone Promotions</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- SIDEBAR -->
<nav class="sidebar">
  <div class="sidebar-brand"><div class="brand">⬡ OZONE</div><div class="sub">Promoter Portal</div></div>
  <div class="user-badge">
    <div class="user-avatar avatar-promoter" id="sb-av">ZD</div>
    <div class="user-info"><div class="name" id="sb-name">Zanele Dlamini</div><span class="role-badge rb-promoter">Promoter</span></div>
  </div>
  <div id="nav-menu"></div>
  <div class="sidebar-bottom"><button class="btn-logout" onclick="doLogout()">⏻ Sign Out</button></div>
</nav>

<!-- MAIN -->
<main class="main-content">
  <div class="page" id="page-dashboard"></div>
  <div class="page" id="page-mybookings"></div>
  <div class="page" id="page-myshift"></div>
  <div class="page" id="page-mypay"></div>
  <div class="page" id="page-reports"></div>
  <div class="page" id="page-photos"></div>
</main>

<!-- SHIFT REPORT MODAL -->
<div class="modal-overlay" id="modal-feedback"
     data-booking="" data-store="" data-promoter="">
  <div class="modal" style="max-width:520px">
    <h2>📝 Shift Feedback Report</h2>

    <!-- Shift context pill — filled dynamically -->
    <div id="feedback-shift-label"
         style="background:rgba(0,212,255,.07);border:1px solid rgba(0,212,255,.15);
                border-radius:var(--r);padding:9px 13px;margin-bottom:1rem;
                font-size:.8rem;color:var(--oz-muted);line-height:1.7">
    </div>

    <div class="form-group">
      <label>Overall Shift Rating <span style="color:var(--oz-red)">*</span></label>
      <div style="display:flex;gap:.5rem;margin-top:.35rem" id="rating-stars">
          <button type="button" onclick="setRating(1)" data-star="1" style="background:none;border:none;font-size:1.6rem;cursor:pointer;transition:transform .15s;padding:0 2px" title="1 star">☆</button>
          <button type="button" onclick="setRating(2)" data-star="2" style="background:none;border:none;font-size:1.6rem;cursor:pointer;transition:transform .15s;padding:0 2px" title="2 stars">☆</button>
          <button type="button" onclick="setRating(3)" data-star="3" style="background:none;border:none;font-size:1.6rem;cursor:pointer;transition:transform .15s;padding:0 2px" title="3 stars">☆</button>
          <button type="button" onclick="setRating(4)" data-star="4" style="background:none;border:none;font-size:1.6rem;cursor:pointer;transition:transform .15s;padding:0 2px" title="4 stars">☆</button>
          <button type="button" onclick="setRating(5)" data-star="5" style="background:none;border:none;font-size:1.6rem;cursor:pointer;transition:transform .15s;padding:0 2px" title="5 stars">☆</button>
      </div>
      <input type="hidden" id="fb-rating" value="">
    </div>

    <div class="form-group">
      <label>Customer Responses <span style="color:var(--oz-red)">*</span></label>
      <textarea id="fb-customers" rows="3"
        placeholder="How did customers react? Any notable interactions?"></textarea>
    </div>

    <div class="form-group">
      <label>Sales Observations</label>
      <textarea id="fb-sales" rows="2"
        placeholder="Estimated samples handed out, purchases observed…"></textarea>
    </div>

    <div class="form-group">
      <label>Stock Issues</label>
      <textarea id="fb-stock" rows="2"
        placeholder="Low stock, missing POS material, display issues…"></textarea>
    </div>

    <div class="form-group">
      <label>Challenges / Other Notes</label>
      <textarea id="fb-challenges" rows="2"
        placeholder="Anything that made the shift difficult or unusual…"></textarea>
    </div>

    <div class="modal-footer">
      <button class="btn btn-ghost"
        onclick="OZ.closeModal('modal-feedback')">Cancel</button>
      <button class="btn btn-accent"
        onclick="submitFeedback()">Submit Report →</button>
    </div>
  </div>
</div>

<!-- Chatbot -->
<button class="chat-fab" id="chat-fab" onclick="toggleChat()">
  💬<span class="chat-badge" id="chat-badge" style="display:none">!</span>
</button>
<div class="chat-panel" id="chat-panel">
  <div class="chat-header">
    <div class="ch-avatar">🤖</div>
    <div><div class="ch-name">Ozone Assistant</div><div class="ch-status">● Online · Promoter mode</div></div>
    <button class="ch-close" onclick="toggleChat()">✕</button>
  </div>
  <div class="chat-messages" id="chat-messages"></div>
  <div class="chat-quick-replies" id="chat-qr"></div>
  <div class="chat-input-row">
    <input type="text" id="chat-input" placeholder="Ask me anything…" onkeydown="if(event.key==='Enter')sendChat()">
    <button class="chat-send-btn" onclick="sendChat()">➤</button>
  </div>
</div>
<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="javascript/supabase.js"></script>
<script src="javascript/auth-session.js"></script>
<script src="javascript/index.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
// @ts-nocheck
// ── SESSION — uses auth-session.js window.OZ_USER ─────────────
let OZ_ME = null; // set after auth resolves

// auth-session.js sets window.OZ_USER asynchronously.
// We poll briefly then boot.
async function waitForUser(retries = 20) {
  for (let i = 0; i < retries; i++) {
    if (window.OZ_USER) return window.OZ_USER;
    await new Promise(r => setTimeout(r, 100));
  }
  return null;
}

async function boot() {
  const user = await waitForUser();
  if (!user) { window.location.href = 'login.html'; return; }

  OZ_ME = user;
  document.getElementById('sb-name').textContent = OZ_ME.name;
  document.getElementById('sb-av').textContent   = OZ_ME.initials;

  // Load settings for pay rate display
  const { data: sys } = await window.supabaseClient
    .from('system_settings').select('*').eq('id',1).single();
  if (sys) {
    window.SETTINGS = window.SETTINGS || {};
    window.SETTINGS.hourlyRate        = Number(sys.hourly_rate_zar);
    window.SETTINGS.shiftHours        = sys.standard_shift_hrs;
    window.SETTINGS.paymentTermsDays  = sys.payment_terms_days;
    window.SETTINGS.minPhotosPerShift = sys.min_photos_per_shift;
    window.SETTINGS.showEarningsToPromoter = sys.show_earnings_to_promoter ?? true;
    window.SETTINGS.requireFeedbackBeforeCheckout = sys.require_feedback_before_checkout ?? true;
    window.SETTINGS.currencySymbol    = 'R';
  }

  await buildNav();
  showPage('dashboard');
}

async function doLogout() {
  await window.supabaseClient.auth.signOut();
  sessionStorage.clear();
  window.location.href = 'login.html';
}

// ── NAV ───────────────────────────────────────────────────────
const NAV = [
  { section:'My Work', items:[
    { id:'dashboard',   icon:'📊', label:'Dashboard' },
    { id:'mybookings',  icon:'📅', label:'My Bookings', dynamicBadge:true },
    { id:'myshift',     icon:'⚡', label:'Active Shift' },
  ]},
  { section:'Earnings', items:[
    { id:'mypay', icon:'💰', label:'My Pay' },
  ]},
  { section:'Submissions', items:[
    { id:'reports', icon:'📝', label:'My Reports' },
    { id:'photos',  icon:'📷', label:'My Photos' },
  ]},
];

async function buildNav() {
  // Count pending offers for badge
  let pendingCount = 0;
  if (OZ_ME) {
    const today = new Date().toISOString().split('T')[0];
    const { data } = await window.supabaseClient
      .from('bookings')
      .select('id')
      .eq('promoter_id', OZ_ME.id)
      .eq('status', 'pending')
      .gte('shift_date', today);
    pendingCount = data?.length || 0;
  }

  let html = '';
  NAV.forEach(sec => {
    html += `<div class="nav-section">${sec.section}</div>`;
    sec.items.forEach(item => {
      const badge = (item.dynamicBadge && pendingCount > 0)
        ? `<span class="nbadge nbadge-amber">${pendingCount}</span>` : '';
      html += `<div class="nav-item" id="nav-${item.id}" onclick="showPage('${item.id}')"><span class="nav-icon">${item.icon}</span><span>${item.label}</span>${badge}</div>`;
    });
  });
  document.getElementById('nav-menu').innerHTML = html;
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-'+id)?.classList.add('active');
  document.getElementById('nav-'+id)?.classList.add('active');
  const r = {
    dashboard:  renderDashboard,
    mybookings: renderMyBookings,
    myshift:    renderMyShift,
    mypay:      renderMyPay,
    reports:    renderReports,
    photos:     renderPhotos,
  };
  r[id]?.();
}

// ── DASHBOARD ─────────────────────────────────────────────────
async function renderDashboard() {
  const el = document.getElementById('page-dashboard');
  const S  = window.SETTINGS || {};
  const sym = S.currencySymbol || 'R';
  const today = new Date().toISOString().split('T')[0];

  el.innerHTML = `<div style="padding:2rem;text-align:center;color:var(--oz-muted)">Loading…</div>`;

  const db = window.supabaseClient;

  // Pending offers (not expired)
  const { data: pending } = await db.from('bookings')
    .select('id, ref_number, shift_date, shift_slot, store:store_id(name,retailer,branch), product:product_id(name,brand)')
    .eq('promoter_id', OZ_ME.id).eq('status','pending').gte('shift_date', today)
    .order('shift_date').limit(5);

  // Next confirmed shift
  const { data: upcoming } = await db.from('bookings')
    .select('id, shift_date, shift_slot, store:store_id(name,retailer,branch), product:product_id(name,brand)')
    .eq('promoter_id', OZ_ME.id).eq('status','confirmed').gte('shift_date', today)
    .order('shift_date').limit(1);

  // Completed count this year
  const yearStart = new Date().getFullYear() + '-01-01';
  const { data: completed } = await db.from('bookings')
    .select('id, total_pay_zar').eq('promoter_id', OZ_ME.id).eq('status','completed')
    .gte('shift_date', yearStart);

  const pendingCount  = pending?.length  || 0;
  const nextShift     = upcoming?.[0];
  const completedCount= completed?.length|| 0;
  const totalEarned   = (completed||[]).reduce((s,b) => s + Number(b.total_pay_zar||0), 0);

  const fmtStore = b => b.store ? (b.store.retailer ? `${b.store.retailer} — ${b.store.branch}` : b.store.name) : '—';

  el.innerHTML = `
  <div class="page-header">
    <div class="page-header-left">
      <h1>Good ${getGreeting()}, ${OZ_ME.firstName} ☀️</h1>
      <p>${new Date().toLocaleDateString('en-ZA',{weekday:'long',month:'long',day:'numeric'})}</p>
    </div>
  </div>

  <div class="welcome-banner">
    <div>
      <h2>${pendingCount > 0 ? `You have ${pendingCount} pending offer${pendingCount!==1?'s':''} 📬` : nextShift ? 'Next shift coming up ✅' : 'No upcoming shifts'}</h2>
      <p>${nextShift ? `Next: ${fmtStore(nextShift)} · ${nextShift.shift_date} · ${nextShift.shift_slot}` : pendingCount > 0 ? 'Review your offers in My Bookings.' : 'Check My Bookings for new offers.'}</p>
    </div>
    <button class="checkin-btn" onclick="showPage('mybookings')">📅 View Bookings</button>
  </div>

  <div class="stats-grid">
    <div class="stat-card" style="--accent-color:var(--oz-accent)"><div class="stat-label">Upcoming</div><div class="stat-value">${upcoming?.length||0}</div><div class="stat-sub">Confirmed shifts</div></div>
    <div class="stat-card" style="--accent-color:var(--oz-accent3)"><div class="stat-label">Pending Response</div><div class="stat-value" style="color:${pendingCount>0?'var(--oz-accent3)':'inherit'}">${pendingCount}</div><div class="stat-sub"><a onclick="showPage('mybookings')" style="color:var(--oz-accent);cursor:pointer;font-size:.72rem">View →</a></div></div>
    <div class="stat-card" style="--accent-color:var(--oz-green)"><div class="stat-label">Shifts Done</div><div class="stat-value">${completedCount}</div><div class="stat-sub">This year</div></div>
    ${S.showEarningsToPromoter ? `<div class="stat-card" style="--accent-color:var(--oz-green)"><div class="stat-label">Total Earned</div><div class="stat-value" style="font-size:1.3rem;color:var(--oz-green)">${sym}${totalEarned.toLocaleString()}</div><div class="stat-sub">This year</div></div>` : ''}
  </div>

  ${pendingCount > 0 ? `
  <div class="card">
    <div class="card-title">🔔 Pending Offers — action needed</div>
    ${(pending||[]).map(b => `
    <div class="notif-item pending" style="cursor:pointer" onclick="showPage('mybookings')">
      <div class="notif-dot" style="background:var(--oz-accent3)"></div>
      <div>
        <b>${b.product?.brand ? b.product.brand+' — ' : ''}${b.product?.name||'Activation'}</b>
        <br><span style="font-size:.78rem;color:var(--oz-muted)">${fmtStore(b)} · ${b.shift_date} · ${b.shift_slot} — <span style="color:var(--oz-accent)">Tap to respond</span></span>
      </div>
    </div>`).join('')}
  </div>` : ''}`;
}

function getGreeting() {
  const h = new Date().getHours();
  return h < 12 ? 'morning' : h < 17 ? 'afternoon' : 'evening';
}

// ── MY BOOKINGS — Supabase wired ──────────────────────────────
async function renderMyBookings() {
  const el  = document.getElementById('page-mybookings');
  const S   = window.SETTINGS || {};
  const sym = S.currencySymbol || 'R';
  const tab = window._bookingTab || 'pending';
  const today = new Date().toISOString().split('T')[0];

  el.innerHTML = `<div style="padding:2rem;text-align:center;color:var(--oz-muted)"><div class="loading-spinner" style="margin:0 auto 1rem"></div>Loading bookings…</div>`;

  const db = window.supabaseClient;

  // Fetch all bookings for this promoter
  const { data: allBookings, error } = await db
    .from('bookings')
    .select(`
      id, ref_number, shift_date, shift_slot, shift_hours,
      hourly_rate_zar, total_pay_zar, status,
      notes_for_promoter, required_promoters,
      store:store_id(name, retailer, branch, address, region),
      product:product_id(
        name, brand, category, description, talking_points,
        retail_price, min_age, sampling_allowed, compliance_notes,
        objective, target_audience
      )
    `)
    .eq('promoter_id', OZ_ME.id)
    .order('shift_date', { ascending: false });

  if (error) {
    el.innerHTML = `<div class="card" style="padding:2rem;color:var(--oz-red)">❌ ${error.message}</div>`;
    return;
  }

  const all = allBookings || [];

  // Separate into tabs
  const pendingOffers  = all.filter(b => b.status === 'pending'   && b.shift_date >= today);
  const confirmed      = all.filter(b => b.status === 'confirmed' && b.shift_date >= today);
  const history        = all.filter(b => ['completed','declined','cancelled'].includes(b.status) || (b.status !== 'pending' && b.shift_date < today));
  const expired        = all.filter(b => b.status === 'pending'   && b.shift_date < today);
  // Full offers = ones where manager's required_promoters count was met by others
  // We detect these as confirmed by others; for now we show separately
  const tabData = {
    pending:   pendingOffers,
    confirmed: confirmed,
    history:   [...history, ...expired],
  };
  const counts = {
    pending:   pendingOffers.length,
    confirmed: confirmed.length,
    history:   history.length + expired.length,
  };

  const tabBtnStyle = (t) => t === tab
    ? `style="background:var(--oz-accent);color:#000;border-color:var(--oz-accent);font-weight:700"`
    : `style="background:var(--oz-surface2);border:1px solid var(--oz-border2)"`;

  el.innerHTML = `
  <div class="page-header">
    <div class="page-header-left"><h1>My Bookings</h1><p>Respond to offers and track your shifts</p></div>
  </div>

  <!-- Tab bar -->
  <div style="display:flex;gap:8px;margin-bottom:1.2rem;flex-wrap:wrap">
    <button class="btn" ${tabBtnStyle('pending')} onclick="window._bookingTab='pending';renderMyBookings()">
      📬 Pending ${counts.pending > 0 ? `<span class="nbadge nbadge-amber" style="margin-left:5px">${counts.pending}</span>` : ''}
    </button>
    <button class="btn" ${tabBtnStyle('confirmed')} onclick="window._bookingTab='confirmed';renderMyBookings()">
      ✅ Confirmed ${counts.confirmed > 0 ? `<span class="nbadge nbadge-green" style="margin-left:5px">${counts.confirmed}</span>` : ''}
    </button>
    <button class="btn" ${tabBtnStyle('history')} onclick="window._bookingTab='history';renderMyBookings()">
      🗂 History
    </button>
  </div>

  ${renderBookingCards(tabData[tab], tab, sym, S, today)}`;

  // Refresh nav badge
  buildNav();
}

function renderBookingCards(bookings, tab, sym, S, today) {
  if (!bookings.length) {
    const emptyMsg = {
      pending:   '📭 No pending offers right now. Check back soon!',
      confirmed: '📅 No confirmed shifts yet. Accept an offer to get started.',
      history:   '🗂 No shift history yet.',
    };
    return `<div class="card" style="text-align:center;padding:3rem;color:var(--oz-dim)">${emptyMsg[tab]||'Nothing here.'}</div>`;
  }

  return bookings.map(b => {
    const fmtStore    = b.store ? (b.store.retailer ? `${b.store.retailer} — ${b.store.branch}` : b.store.name) : '—';
    const fmtCampaign = b.product ? (b.product.brand ? `${b.product.brand} — ${b.product.name}` : b.product.name) : '—';
    const pay         = b.total_pay_zar || ((b.hourly_rate_zar||S.hourlyRate||45) * (b.shift_hours||S.shiftHours||8));
    const isExpired   = b.shift_date < today && b.status === 'pending';

    const statusColor = {
      pending:   'var(--oz-accent3)',
      confirmed: 'var(--oz-green)',
      declined:  'var(--oz-red)',
      completed: 'var(--oz-accent)',
      cancelled: 'var(--oz-dim)',
    }[b.status] || 'var(--oz-dim)';

    const statusBadge = isExpired
      ? `<span class="badge badge-gray">⏰ Expired</span>`
      : `<span class="badge" style="background:${statusColor}22;color:${statusColor};border:1px solid ${statusColor}44">${b.status}</span>`;

    // Campaign detail panel
    const p = b.product;
    const campaignDetail = p ? `
    <div style="background:rgba(0,212,255,.04);border:1px solid rgba(0,212,255,.1);border-radius:var(--r);padding:12px 14px;margin:10px 0">
      <div style="font-size:.65rem;text-transform:uppercase;letter-spacing:1px;color:var(--oz-accent);font-weight:700;margin-bottom:8px">What you're promoting</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:.78rem;margin-bottom:8px">
        <div><span style="color:var(--oz-dim)">Product:</span> <strong>${p.name}</strong></div>
        ${p.brand ? `<div><span style="color:var(--oz-dim)">Brand:</span> ${p.brand}</div>` : ''}
        ${p.category ? `<div><span style="color:var(--oz-dim)">Category:</span> ${p.category}</div>` : ''}
        ${p.retail_price ? `<div><span style="color:var(--oz-dim)">Retail Price:</span> <strong style="color:var(--oz-green)">R${p.retail_price}</strong></div>` : ''}
        ${p.min_age ? `<div><span style="color:var(--oz-dim)">Min Age:</span> <span style="color:var(--oz-red)">${p.min_age}+</span></div>` : ''}
        ${p.sampling_allowed !== null ? `<div><span style="color:var(--oz-dim)">Sampling:</span> ${p.sampling_allowed ? '✅ Allowed' : '❌ Not allowed'}</div>` : ''}
      </div>
      ${p.description ? `<div style="font-size:.78rem;color:var(--oz-muted);margin-bottom:6px">${p.description}</div>` : ''}
      ${p.objective ? `<div style="font-size:.75rem;color:var(--oz-muted);margin-bottom:4px">🎯 <strong>Objective:</strong> ${p.objective}</div>` : ''}
      ${p.target_audience ? `<div style="font-size:.75rem;color:var(--oz-muted);margin-bottom:4px">👥 <strong>Audience:</strong> ${p.target_audience}</div>` : ''}
      ${p.talking_points ? `
      <div style="margin-top:6px">
        <div style="font-size:.65rem;text-transform:uppercase;letter-spacing:1px;color:var(--oz-accent);font-weight:700;margin-bottom:4px">Talking Points</div>
        <div style="font-size:.76rem;color:var(--oz-muted);white-space:pre-line;line-height:1.6">${p.talking_points}</div>
      </div>` : ''}
      ${p.compliance_notes ? `
      <div style="margin-top:8px;background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.15);border-radius:var(--r);padding:7px 10px">
        <div style="font-size:.65rem;text-transform:uppercase;letter-spacing:1px;color:var(--oz-red);font-weight:700;margin-bottom:3px">⚖️ Compliance</div>
        <div style="font-size:.74rem;color:var(--oz-muted)">${p.compliance_notes}</div>
      </div>` : ''}
    </div>` : '';

    const storeDetail = b.store ? `
    <div style="font-size:.79rem;color:var(--oz-muted);margin-top:5px">
      📍 ${b.store.address ? b.store.address + ', ' : ''}${b.store.region || ''}
    </div>` : '';

    // Action buttons
    let actions = '';
    if (b.status === 'pending' && !isExpired) {
      actions = `
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="btn btn-success" onclick="respondToOffer('${b.id}','confirmed','${b.shift_date}')">✅ Accept Offer</button>
        <button class="btn btn-danger"  onclick="respondToOffer('${b.id}','declined', '${b.shift_date}')">❌ Decline</button>
      </div>`;
    } else if (b.status === 'confirmed' && b.shift_date >= today) {
      actions = `
      <div style="margin-top:10px">
        <button class="btn btn-outline btn-sm" onclick="showPage('myshift')">⚡ Go to Active Shift</button>
      </div>`;
    }

    return `
    <div class="card" style="margin-bottom:1rem;border-left:4px solid ${statusColor}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:.75rem;margin-bottom:8px">
        <div>
          <div style="font-family:var(--font-h);font-size:1rem;font-weight:700;margin-bottom:2px">${fmtCampaign}</div>
          <div style="color:var(--oz-muted);font-size:.84rem">🏪 ${fmtStore}</div>
          <div style="color:var(--oz-muted);font-size:.84rem;margin-top:2px">🗓 ${b.shift_date} · ${b.shift_slot}</div>
          ${storeDetail}
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
          ${statusBadge}
          <span class="pay-badge">💰 ${sym}${Number(pay).toLocaleString()}</span>
          <span style="font-size:.72rem;color:var(--oz-dim)">${b.ref_number}</span>
        </div>
      </div>
      ${campaignDetail}

      ${actions}
    </div>`;
  }).join('');
}

async function respondToOffer(bookingId, newStatus, shiftDate) {
  const db    = window.supabaseClient;
  const today = new Date().toISOString().split('T')[0];

  if (newStatus === 'confirmed') {
    // Rule 1: Cannot accept if shift date has passed
    if (shiftDate < today) {
      OZ.toast('⏰ This offer has expired — the shift date has passed.');
      return;
    }

    // Rule 2: Cannot accept two jobs on the same day
    const { data: clash } = await db
      .from('bookings')
      .select('id, ref_number, store:store_id(name)')
      .eq('promoter_id', OZ_ME.id)
      .eq('shift_date', shiftDate)
      .eq('status', 'confirmed')
      .limit(1);

    if (clash && clash.length > 0) {
      const clashStore = clash[0].store?.name || 'another store';
      OZ.toast(`❌ You already have a confirmed shift on ${shiftDate} at ${clashStore}. You cannot accept two shifts on the same day.`);
      return;
    }

    // Rule 3: Check if required_promoters slots are already filled
    const { data: booking } = await db
      .from('bookings')
      .select('required_promoters, ref_number')
      .eq('id', bookingId).single();

    if (booking?.required_promoters > 1) {
      // Count how many others already confirmed for same ref shift (same store/date/slot)
      const { data: confirmed } = await db
        .from('bookings')
        .select('id')
        .eq('store_id', (await db.from('bookings').select('store_id').eq('id',bookingId).single()).data?.store_id)
        .eq('shift_date', shiftDate)
        .eq('status', 'confirmed');

      if ((confirmed?.length || 0) >= booking.required_promoters) {
        OZ.toast('⚠️ Sorry — this offer is full. The required number of promoters have already accepted.');
        return;
      }
    }
  }

  const { error } = await db
    .from('bookings')
    .update({ status: newStatus, responded_at: new Date().toISOString() })
    .eq('id', bookingId);

  if (error) { OZ.toast('❌ ' + error.message); return; }

  if (newStatus === 'confirmed') {
    OZ.toast('✅ Offer accepted! See you at the shift.');
  } else {
    OZ.toast('Offer declined.');
  }

  renderMyBookings();
}

// ── STEP 1: QR SCANNER ────────────────────────────────────────
let _qrScanner = null;

async function openQRScanner(bookingId) {
  const overlay = document.getElementById('qr-scanner-overlay');
  const status  = document.getElementById('qr-scan-status');
  overlay.style.display = 'flex';
  status.textContent    = 'Point your camera at the QR code…';

  // Clean up any previous scanner instance
  if (_qrScanner) {
    try { await _qrScanner.stop(); } catch(e) {}
    _qrScanner = null;
  }

  // Clear the reader div so html5-qrcode can remount cleanly
  document.getElementById('qr-reader').innerHTML = '';

  _qrScanner = new Html5Qrcode('qr-reader');

  try {
    await _qrScanner.start(
      { facingMode: 'environment' }, // rear camera
      { fps: 10, qrbox: { width: 220, height: 220 } },
      (decodedText) => handleQRScan(decodedText, bookingId),
      () => {} // ignore per-frame errors
    );
  } catch (err) {
    status.innerHTML = `
      <span style="color:var(--oz-red)">
        ❌ Camera access denied.<br>
        <span style="font-size:.76rem">Allow camera permissions and try again.</span>
      </span>`;
  }
}

async function handleQRScan(scannedToken, bookingId) {
  // Stop scanner immediately — prevent double-fire
  if (_qrScanner) {
    try { await _qrScanner.stop(); } catch(e) {}
    _qrScanner = null;
  }

  const db     = window.supabaseClient;
  const status = document.getElementById('qr-scan-status');

  status.innerHTML = `<span style="color:var(--oz-muted)">⏳ Verifying…</span>`;

  // ── 1. Look up the token for this specific booking ───────────
  const { data: tokenRec } = await db
    .from('booking_qr_tokens')
    .select('token, expires_at')
    .eq('booking_id', bookingId)
    .maybeSingle();

  // ── 2. No QR generated yet for this booking ──────────────────
  if (!tokenRec) {
    status.innerHTML = `
      <span style="color:var(--oz-red)">
        ❌ No QR code has been generated for this shift yet.<br>
        <span style="font-size:.76rem">Contact your manager.</span>
      </span>`;
    setTimeout(closeQRScanner, 3500);
    return;
  }

  // ── 3. Check expiry if set ────────────────────────────────────
  if (tokenRec.expires_at && new Date(tokenRec.expires_at) < new Date()) {
    status.innerHTML = `
      <span style="color:var(--oz-red)">
        ⏰ QR code expired.<br>
        <span style="font-size:.76rem">Ask your manager to regenerate it.</span>
      </span>`;
    setTimeout(closeQRScanner, 3500);
    return;
  }

  // ── 4. Token mismatch ─────────────────────────────────────────
  if (scannedToken.trim() !== tokenRec.token.trim()) {
    status.innerHTML = `
      <span style="color:var(--oz-red)">
        ❌ QR code not valid for this shift.<br>
        <span style="font-size:.76rem">Make sure you are scanning the correct store code.</span>
      </span>`;
    // Restart scanner after 3s so they can try again
    setTimeout(async () => {
      if (document.getElementById('qr-scanner-overlay').style.display !== 'none') {
        status.textContent = 'Point your camera at the QR code…';
        document.getElementById('qr-reader').innerHTML = '';
        _qrScanner = new Html5Qrcode('qr-reader');
        try {
          await _qrScanner.start(
            { facingMode: 'environment' },
            { fps: 10, qrbox: { width: 220, height: 220 } },
            (t) => handleQRScan(t, bookingId),
            () => {}
          );
        } catch(e) {}
      }
    }, 3000);
    return;
  }

  // ── 5. Valid — check for duplicate check-in ───────────────────
  const { data: existing } = await db
    .from('attendance_logs')
    .select('id')
    .eq('booking_id', bookingId)
    .maybeSingle();

  if (existing) {
    status.innerHTML = `
      <span style="color:var(--oz-green)">
        ✅ Already checked in for this shift.
      </span>`;
    setTimeout(() => { closeQRScanner(); renderMyShift(); }, 1500);
    return;
  }

  // ── 6. Write attendance_log row ───────────────────────────────
  const { data: booking } = await db
    .from('bookings')
    .select('store_id')
    .eq('id', bookingId)
    .single();

  const { error } = await db
    .from('attendance_logs')
    .insert({
      booking_id:       bookingId,
      promoter_id:      OZ_ME.id,
      store_id:         booking?.store_id || null,
      checked_in_at:    new Date().toISOString(),
      checkin_device_id: navigator.userAgent.slice(0, 80),
      checkin_method:   'qr',
      status:           'checked_in',
    });

  if (error) {
    status.innerHTML = `
      <span style="color:var(--oz-red)">
        ❌ Check-in failed: ${error.message}
      </span>`;
    return;
  }

  // ── 7. Success ────────────────────────────────────────────────
  status.innerHTML = `
    <span style="color:var(--oz-green);font-weight:700">
      ✅ Checked in successfully!
    </span>`;

  OZ.toast('📍 Check-in recorded!');
  setTimeout(() => { closeQRScanner(); renderMyShift(); }, 1200);
}

function closeQRScanner() {
  if (_qrScanner) {
    try { _qrScanner.stop(); } catch(e) {}
    _qrScanner = null;
  }
  const overlay = document.getElementById('qr-scanner-overlay');
  if (overlay) overlay.style.display = 'none';
}

// ── STEP 2: PHOTO UPLOAD + ALBUM ─────────────────────────────
async function uploadShiftPhoto(input, bookingId) {
  const file = input.files?.[0];
  if (!file) return;

  const db      = window.supabaseClient;
  const S       = window.SETTINGS || {};
  const booking = shiftContext.booking;
  if (!booking) return;

  // Pull full booking details needed for metadata
  const campaignLabel = booking.product
    ? (booking.product.brand
        ? `${booking.product.brand} — ${booking.product.name}`
        : booking.product.name)
    : 'Activation';
  const storeName = booking.store
    ? (booking.store.retailer
        ? `${booking.store.retailer} — ${booking.store.branch}`
        : booking.store.name)
    : '—';
  const pay = booking.total_pay_zar ||
    ((booking.hourly_rate_zar || S.hourlyRate || 45) *
     (booking.shift_hours || S.shiftHours || 8));

  // ── Check max photos ────────────────────────────────────────
  const maxPhotos = S.maxPhotosPerShift || 30;
  if (shiftContext.photoCount >= maxPhotos) {
    OZ.toast(`Maximum ${maxPhotos} photos per shift reached`);
    input.value = '';
    return;
  }

  OZ.toast('📤 Uploading…');

  // ── Build storage path ──────────────────────────────────────
  // Path: shift-photos/{promoter_id}/{booking_id}/{timestamp}-{filename}
  const ts       = Date.now();
  const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
  const path     = `${OZ_ME.id}/${bookingId}/${ts}-${safeName}`;

  // ── Upload to Storage ───────────────────────────────────────
  const { error: upErr } = await db.storage
    .from('shift-photos')
    .upload(path, file, {
      cacheControl: '3600',
      upsert: false,
      contentType: file.type,
    });

  if (upErr) {
    OZ.toast('❌ Upload failed: ' + upErr.message);
    input.value = '';
    return;
  }

  // ── Get signed URL for immediate display (1hr) ──────────────
  const { data: signedData } = await db.storage
    .from('shift-photos')
    .createSignedUrl(path, 3600);
  const publicUrl = signedData?.signedUrl || '';

  // ── Insert into shift_photos table with full job context ────
  const { error: dbErr } = await db
    .from('shift_photos')
    .insert({
      booking_id:    bookingId,
      attendance_id: shiftContext.attendance?.id || null,
      promoter_id:   OZ_ME.id,
      storage_path:  path,
      file_name:     file.name,
      file_size_bytes: file.size,
      mime_type:     file.type,
      public_url:    publicUrl,
      // Rich job metadata
      store_name:    storeName,
      campaign_name: campaignLabel,
      shift_date:    booking.shift_date,
      shift_slot:    booking.shift_slot || null,
      shift_pay_zar: pay,
      shift_hours:   booking.shift_hours || S.shiftHours || 8,
    });

  if (dbErr) {
    OZ.toast('❌ Could not save photo record: ' + dbErr.message);
    // Clean up the storage upload
    await db.storage.from('shift-photos').remove([path]);
    input.value = '';
    return;
  }

  // ── Update local count + refresh album ──────────────────────
  shiftContext.photoCount++;
  input.value = '';

  const minPhotos = S.minPhotosPerShift || 10;
  OZ.toast(`📸 Photo ${shiftContext.photoCount} uploaded!`);

  // Refresh album and counter in the DOM without full page reload
  await renderPhotoAlbum(bookingId, campaignLabel, booking.shift_date);

  // Update the photo counter text
  const counterEl = document.querySelector('#page-myshift [data-photo-counter]');
  if (counterEl) {
    counterEl.textContent =
      `${shiftContext.photoCount >= minPhotos ? '✓ ' : ''}${shiftContext.photoCount} / ${minPhotos} photos uploaded`;
    counterEl.style.color = shiftContext.photoCount >= minPhotos
      ? 'var(--oz-green)' : 'var(--oz-muted)';
  }

  // If just hit the minimum, re-render to unlock Step 3
  if (shiftContext.photoCount === minPhotos) {
    OZ.toast('✅ Minimum photos reached — Step 3 unlocked!');
    setTimeout(renderMyShift, 800);
  }
}

async function renderPhotoAlbum(bookingId, campaignLabel, shiftDate) {
  const el = document.getElementById('photo-album-grid');
  if (!el) return;

  const db = window.supabaseClient;
  const S  = window.SETTINGS || {};
  const minPhotos = S.minPhotosPerShift || 10;

  // Fetch all photos for this booking
  const { data: photos } = await db
    .from('shift_photos')
    .select('id, file_name, public_url, storage_path, uploaded_at, file_size_bytes')
    .eq('booking_id', bookingId)
    .order('uploaded_at', { ascending: true });

  const list = photos || [];

  if (!list.length) {
    el.innerHTML = `
      <div style="text-align:center;padding:1.5rem;color:var(--oz-dim);
           border:2px dashed var(--oz-border2);border-radius:var(--r)">
        <div style="font-size:2rem;margin-bottom:.4rem">📷</div>
        <div style="font-size:.82rem">No photos yet — tap <strong>+ Add Photo</strong> to start</div>
        <div style="font-size:.75rem;color:var(--oz-dim);margin-top:.25rem">
          Min ${minPhotos} required · Max ${S.maxPhotosPerShift || 30}
        </div>
      </div>`;
    return;
  }

// ── Photo preview lightbox ────────────────────────────────────
function previewPhoto(url, name, time, size) {
  if (!url) return;
  // Create a simple overlay lightbox
  const existing = document.getElementById('photo-lightbox');
  if (existing) existing.remove();

  const lb = document.createElement('div');
  lb.id = 'photo-lightbox';
  lb.style.cssText = `position:fixed;inset:0;background:rgba(0,0,0,.93);
    z-index:9998;display:flex;flex-direction:column;
    align-items:center;justify-content:center;padding:1.5rem;cursor:pointer`;
  lb.onclick = () => lb.remove();
  lb.innerHTML = `
    <img src="${url}" alt="${name}"
      style="max-width:100%;max-height:75vh;border-radius:10px;
             object-fit:contain;box-shadow:0 8px 40px rgba(0,0,0,.6)">
    <div style="margin-top:.85rem;text-align:center">
      <div style="color:#fff;font-size:.82rem;font-weight:600">${name}</div>
      <div style="color:rgba(255,255,255,.45);font-size:.72rem;margin-top:3px">
        ${time ? '🕐 ' + time : ''} ${size ? '· ' + size : ''}
      </div>
      <div style="color:rgba(255,255,255,.3);font-size:.7rem;margin-top:.5rem">
        Tap anywhere to close
      </div>
    </div>`;
  document.body.appendChild(lb);
}


// ── STEP 3: FEEDBACK REPORT ───────────────────────────────────
function openFeedbackModal(bookingId, storeId, promoterId) {
  const modal   = document.getElementById('modal-feedback');
  const booking = shiftContext.booking;

  // Store IDs on modal for submitFeedback to read
  modal.setAttribute('data-booking',  bookingId);
  modal.setAttribute('data-store',    storeId);
  modal.setAttribute('data-promoter', promoterId);

  // Fill the shift context pill at the top of the modal
  const label = document.getElementById('feedback-shift-label');
  if (label && booking) {
    const campaignLabel = booking.product
      ? (booking.product.brand
          ? `${booking.product.brand} — ${booking.product.name}`
          : booking.product.name)
      : 'Activation';
    const storeName = booking.store
      ? (booking.store.retailer
          ? `${booking.store.retailer} — ${booking.store.branch}`
          : booking.store.name)
      : '—';
    const dateStr = booking.shift_date
      ? new Date(booking.shift_date).toLocaleDateString('en-ZA',
          { weekday:'short', day:'numeric', month:'short', year:'numeric' })
      : '—';
    label.innerHTML = `
      <strong style="color:var(--oz-text)">${campaignLabel}</strong><br>
      🏪 ${storeName} &nbsp;·&nbsp; 📅 ${dateStr} &nbsp;·&nbsp; 🕐 ${booking.shift_slot || '—'}
    `;
  }

  // Reset form fields
  ['fb-customers','fb-sales','fb-stock','fb-challenges'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  document.getElementById('fb-rating').value = '';
  setRating(0); // clear stars

  OZ.openModal('modal-feedback');
}

function setRating(n) {
  document.getElementById('fb-rating').value = n;
  document.querySelectorAll('#rating-stars button').forEach(btn => {
    const star = parseInt(btn.dataset.star);
    btn.textContent  = star <= n ? '⭐' : '☆';
    btn.style.transform = star === n ? 'scale(1.25)' : 'scale(1)';
  });
}

async function submitFeedback() {
  const modal      = document.getElementById('modal-feedback');
  const bookingId  = modal.getAttribute('data-booking');
  const storeId    = modal.getAttribute('data-store');
  const promoterId = modal.getAttribute('data-promoter');
  const db         = window.supabaseClient;

  // ── Validation ───────────────────────────────────────────────
  const customers = document.getElementById('fb-customers')?.value.trim();
  const rating    = parseInt(document.getElementById('fb-rating')?.value || '0');

  if (!customers) {
    OZ.toast('⚠️ Customer responses field is required');
    return;
  }
  if (!rating) {
    OZ.toast('⚠️ Please give the shift a star rating');
    return;
  }

  // ── Prevent duplicate submit ──────────────────────────────────
  const { data: existing } = await db
    .from('shift_reports')
    .select('id')
    .eq('booking_id', bookingId)
    .maybeSingle();

  if (existing) {
    OZ.toast('Report already submitted for this shift');
    OZ.closeModal('modal-feedback');
    return;
  }

  // ── Insert into shift_reports ────────────────────────────────
  const attId = shiftContext.attendance?.id || null;

  const { error } = await db
    .from('shift_reports')
    .insert({
      booking_id:          bookingId,
      attendance_id:       attId,
      promoter_id:         promoterId || OZ_ME.id,
      customer_responses:  customers,
      sales_observations:  document.getElementById('fb-sales')?.value.trim()      || null,
      stock_issues:        document.getElementById('fb-stock')?.value.trim()       || null,
      challenges:          document.getElementById('fb-challenges')?.value.trim()  || null,
      rating:              rating,
      overall_rating:      rating,
      submitted_at:        new Date().toISOString(),
    });

  if (error) {
    OZ.toast('❌ Could not save report: ' + error.message);
    return;
  }

  shiftContext.reportDone = true;
  OZ.closeModal('modal-feedback');
  OZ.toast('📝 Report submitted!');

  // Re-render to unlock Step 4 if all conditions met
  setTimeout(renderMyShift, 600);
}

// ── STEP 4: CHECK OUT ─────────────────────────────────────────
async function doCheckout(bookingId, attId) {
  const db = window.supabaseClient;
  const S  = window.SETTINGS || {};
  const sym = S.currencySymbol || 'R';

  // ── Guard: re-check all conditions from DB ───────────────────
  // Prevents bypassing via DOM manipulation
  const [photoRes, reportRes] = await Promise.all([
    db.from('shift_photos')
      .select('id', { count:'exact', head:true })
      .eq('booking_id', bookingId),
    db.from('shift_reports')
      .select('id')
      .eq('booking_id', bookingId)
      .maybeSingle(),
  ]);

  const photoCount = photoRes.count || 0;
  const minPhotos  = S.minPhotosPerShift || 10;
  const reportDone = !!reportRes.data;

  if (photoCount < minPhotos) {
    OZ.toast(`⚠️ Upload ${minPhotos - photoCount} more photo${minPhotos - photoCount !== 1 ? 's' : ''} before checking out`);
    return;
  }
  if (S.requireFeedbackBeforeCheckout && !reportDone) {
    OZ.toast('⚠️ Submit your feedback report before checking out');
    return;
  }

  // ── Confirm ──────────────────────────────────────────────────
  const booking = shiftContext.booking;
  const pay = booking?.total_pay_zar ||
    ((booking?.hourly_rate_zar || S.hourlyRate || 45) *
     (booking?.shift_hours     || S.shiftHours || 8));

  const confirmed = confirm(
    `Sign off this shift?\n\n` +
    `This will record your check-out time and mark the shift complete.\n` +
    `Payment of ${sym}${Number(pay).toLocaleString()} will be processed within ` +
    `${S.paymentTermsDays || 5} business days.`
  );
  if (!confirmed) return;

  const now = new Date().toISOString();

  // ── 1. Update attendance_logs ────────────────────────────────
  if (attId) {
    const { error: attErr } = await db
      .from('attendance_logs')
      .update({
        checked_out_at: now,
        status:         'checked_out',
      })
      .eq('id', attId);

    if (attErr) {
      OZ.toast('❌ Check-out failed: ' + attErr.message);
      return;
    }
  } else {
    // Edge case: no attendance log found — create a minimal one
    const { error: insErr } = await db
      .from('attendance_logs')
      .insert({
        booking_id:     bookingId,
        promoter_id:    OZ_ME.id,
        store_id:       booking?.store?.id || null,
        checked_out_at: now,
        status:         'checked_out',
        photo_count:    photoCount,
      });
    if (insErr) {
      OZ.toast('❌ Check-out failed: ' + insErr.message);
      return;
    }
  }

  // ── 2. Update attendance photo_count ─────────────────────────
  if (attId) {
    await db
      .from('attendance_logs')
      .update({ photo_count: photoCount })
      .eq('id', attId);
  }

  // ── 3. Mark booking as completed ────────────────────────────
  const { error: bkErr } = await db
    .from('bookings')
    .update({
      status:     'completed',
      updated_at: now,
    })
    .eq('id', bookingId);

  if (bkErr) {
    // Non-fatal — attendance is already saved, just warn
    console.warn('Could not mark booking completed:', bkErr.message);
  }

  // ── 4. Update promoter total_shifts count ────────────────────
  const { data: profile } = await db
    .from('promoter_profiles')
    .select('id, total_shifts')
    .eq('user_id', OZ_ME.id)
    .maybeSingle();

  if (profile) {
    await db
      .from('promoter_profiles')
      .update({ total_shifts: (profile.total_shifts || 0) + 1 })
      .eq('id', profile.id);
  }

  // ── 5. Reset shiftContext ────────────────────────────────────
  shiftContext = {
    booking:    null,
    attendance: null,
    photoCount: 0,
    reportDone: false,
  };

  // ── 6. Show completion screen ────────────────────────────────
  const el = document.getElementById('page-myshift');
  const campaignLabel = booking?.product
    ? (booking.product.brand
        ? `${booking.product.brand} — ${booking.product.name}`
        : booking.product.name)
    : 'Activation';
  const storeName = booking?.store
    ? (booking.store.retailer
        ? `${booking.store.retailer} — ${booking.store.branch}`
        : booking.store.name)
    : '—';

  el.innerHTML = `
  <div class="page-header">
    <div class="page-header-left"><h1>Active Shift</h1><p>Today's activation</p></div>
  </div>
  <div class="card" style="text-align:center;padding:3rem 2rem;
       border:2px solid var(--oz-green);margin-bottom:1rem">
    <div style="font-size:3.5rem;margin-bottom:.75rem">🎉</div>
    <div style="font-weight:700;font-size:1.2rem;color:var(--oz-green);margin-bottom:.4rem">
      Shift Complete!
    </div>
    <div style="font-size:.88rem;color:var(--oz-muted);margin-bottom:1.5rem;
         line-height:1.7;max-width:320px;margin-left:auto;margin-right:auto">
      <strong style="color:var(--oz-text)">${campaignLabel}</strong><br>
      🏪 ${storeName}<br>
      📅 ${booking?.shift_date
        ? new Date(booking.shift_date).toLocaleDateString('en-ZA',
            { weekday:'long', day:'numeric', month:'long', year:'numeric' })
        : '—'}<br>
      🕐 ${booking?.shift_slot || '—'} &nbsp;·&nbsp;
      📸 ${photoCount} photos
    </div>
    <div style="background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);
         border-radius:var(--r);padding:1rem 1.5rem;display:inline-block;margin-bottom:1.5rem">
      <div style="font-size:.75rem;color:var(--oz-muted);margin-bottom:.2rem">
        Earnings for this shift
      </div>
      <div style="font-size:2rem;font-weight:700;color:var(--oz-green)">
        ${sym}${Number(pay).toLocaleString()}
      </div>
      <div style="font-size:.74rem;color:var(--oz-dim);margin-top:.2rem">
        Processed within ${S.paymentTermsDays || 5} business days
      </div>
    </div>
    <div style="display:flex;gap:.65rem;justify-content:center;flex-wrap:wrap">
      <button class="btn btn-accent" onclick="showPage('mypay')">
        💰 View My Pay
      </button>
      <button class="btn btn-outline" onclick="showPage('mybookings')">
        📅 My Bookings
      </button>
    </div>
  </div>`;

  OZ.toast('✅ Shift signed off — well done!');
}

    "report":   "Submit your Feedback Report in **Active Shift** Step 3 before checking out.",
    "accept":   "In **My Bookings**, find the pending offer and tap **Accept**. You can't accept two shifts on the same day.",
    "decline":  "In **My Bookings**, find the pending offer and tap **Decline**.",
    "default":  "I can help with bookings, shifts, photos, reports, and pay. What do you need?"
  }
};
function toggleChat(){chatOpen=!chatOpen;document.getElementById('chat-panel').classList.toggle('open',chatOpen);document.getElementById('chat-badge').style.display='none';if(chatOpen&&document.getElementById('chat-messages').children.length===0){addBot(typeof KB.greeting==='function'?KB.greeting():KB.greeting);setQR(KB.quickReplies);}}
function addBot(text,delay=0){const msgs=document.getElementById('chat-messages');if(delay>0){const t=document.createElement('div');t.className='chat-msg bot';t.innerHTML='<div class="chat-typing"><span></span><span></span><span></span></div>';t.id='typ';msgs.appendChild(t);msgs.scrollTop=msgs.scrollHeight;setTimeout(()=>{document.getElementById('typ')?.remove();appendBot(text);},delay);}else appendBot(text);}
function appendBot(text){const msgs=document.getElementById('chat-messages'),el=document.createElement('div');el.className='chat-msg bot';const resolved=typeof text==='function'?text():text;el.innerHTML=`<div class="chat-bubble">${resolved.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')}</div><div class="chat-time">${new Date().toLocaleTimeString('en-ZA',{hour:'2-digit',minute:'2-digit'})}</div>`;msgs.appendChild(el);msgs.scrollTop=msgs.scrollHeight;}
function setQR(chips){document.getElementById('chat-qr').innerHTML=chips.map(c=>`<span class="qr-chip" onclick="handleQR('${c}')">${c}</span>`).join('');}
function handleQR(text){document.getElementById('chat-qr').innerHTML='';sendMsg(text);}
function sendChat(){const i=document.getElementById('chat-input'),t=i.value.trim();if(!t)return;i.value='';sendMsg(t);}
function sendMsg(text){
  const msgs=document.getElementById('chat-messages'),el=document.createElement('div');el.className='chat-msg user';
  el.innerHTML=`<div class="chat-bubble">${text}</div><div class="chat-time">${new Date().toLocaleTimeString('en-ZA',{hour:'2-digit',minute:'2-digit'})}</div>`;
  msgs.appendChild(el);msgs.scrollTop=msgs.scrollHeight;
  const q=text.toLowerCase();let r=null;
  if(q.includes('booking')){r=KB.responses['booking'];setTimeout(()=>showPage('mybookings'),1200);}
  else if(q.includes('pay')||q.includes('earn')){r=KB.responses['pay'];setTimeout(()=>showPage('mypay'),1200);}
  else if(q.includes('shift')||q.includes('check')){r=KB.responses['shift'];setTimeout(()=>showPage('myshift'),1200);}
  else if(q.includes('photo')){r=KB.responses['photo'];setTimeout(()=>showPage('myshift'),1200);}
  else if(q.includes('report')){r=KB.responses['report'];setTimeout(()=>showPage('myshift'),1200);}
  else{for(const[k,v]of Object.entries(KB.responses)){if(k!=='default'&&q.includes(k)){r=v;break;}}}
  if(!r)r=KB.responses['default'];
  addBot(r,750);
  setTimeout(()=>setQR(["📅 My Bookings","💰 My Pay","⚡ Active Shift","📝 Report"]),900);
}

// ── BOOT ──────────────────────────────────────────────────────
boot();
</script>
